<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/lib/xterm.css">
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-left">
            <h1>🌳 {{ app_name }}</h1>
            <span class="tagline">Tell your tree what to look like</span>
        </div>
        <div class="header-right">
            {% if not r_available %}
            <span class="badge badge-warn">R not available</span>
            {% else %}
            <span class="badge badge-ok">R + ggtree ready</span>
            {% endif %}
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/lib/d3.v7.min.js"></script>
    <script src="/static/lib/xterm.min.js"></script>
    <script src="/static/lib/addon-fit.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
